# ─── shell-exec.yml — GitHub Actions Workflow for ForgeClaw Shell Execution ─────
# Place this file in: .github/workflows/shell-exec.yml
# Required by the shell_exec tool. Accepts arbitrary shell commands and returns output.

name: ForgeClaw Shell Execution

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Shell command to execute'
        required: true
        type: string
      working_directory:
        description: 'Working directory relative to repo root'
        required: false
        default: '.'
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Execute shell command
        id: shell_exec
        run: |
          echo "=== ForgeClaw Shell Execution ==="
          echo "Working directory: ${{ github.event.inputs.working_directory }}"
          echo "Command: ${{ github.event.inputs.command }}"
          echo "================================"
          echo ""
          
          cd "${{ github.event.inputs.working_directory }}"
          
          # Run the command and capture output
          {
            echo "::group::Command execution"
            bash -c "${{ github.event.inputs.command }}"
            EXIT_CODE=$?
            echo "::endgroup::"
            echo ""
            echo "=== EXECUTION COMPLETE ==="
            echo "Exit code: $EXIT_CODE"
            
            if [ $EXIT_CODE -ne 0 ]; then
              echo "Status: FAILURE"
              exit $EXIT_CODE
            else
              echo "Status: SUCCESS"
            fi
          }
